<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VGGT-Ω · full point cloud viewer</title>

<style>
:root { color-scheme: light; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #fff; color: #16181c;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
#viewer { position: fixed; inset: 0; }
canvas { display: block; width: 100%; height: 100%; }
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,255,255,0));
  pointer-events: none;
}
header > * { pointer-events: auto; }
.back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: rgba(255,255,255,.82);
  color: #16181c; text-decoration: none;
  border: 1px solid rgba(0,0,0,.14);
  border-radius: 6px;
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  backdrop-filter: blur(6px);
  transition: background .12s;
}
.back:hover { background: rgba(255,255,255,.96); }
#hud {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 12px;
  color: rgba(0,0,0,.68);
  background: rgba(255,255,255,.84);
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,.12);
  backdrop-filter: blur(8px);
  min-width: 220px;
  text-align: center;
}
#hud.warn { color: #ff8085; border-color: rgba(255,107,107,.4); }
#hud.loading {
  top: 50%;
  bottom: auto;
  transform: translate(-50%, -50%);
  font-size: 24px;
}
.kbd {
  display: inline-block;
  background: rgba(0,0,0,.08);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 15.75px;
  margin: 0 1px;
}
#hint { position: fixed; right: 16px; bottom: 16px; z-index: 10;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 16.5px;
  color: rgba(0,0,0,.52);
  background: rgba(255,255,255,.74);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,.1);
  backdrop-filter: blur(6px);
  text-align: right;
  line-height: 1.6;
}
</style>

<!-- importmap polyfill for Safari/iOS < 16.4 (importmap is native from 16.4).
     Loaded synchronously so it's installed before the module script runs. -->
<script src="https://cdn.jsdelivr.net/npm/es-module-shims@1.10.0/dist/es-module-shims.js" crossorigin="anonymous"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<header>
  <a href="index.html#gallery" class="back">‹ back to project page</a>
</header>

<div id="viewer"><canvas id="canvas"></canvas></div>

<div id="hud" class="loading">Loading…</div>
<div id="hint">
  drag = orbit · scroll = zoom · right-drag = pan<br>
  <span class="kbd">R</span> reset · <span class="kbd">L</span> toggle trajectory
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ---- resolve which GLB to load --------------------------------------------
const params = new URLSearchParams(location.search);
const name = params.get('name') || '';
// The video name might use a slightly different GLB filename — keep one alias.
const GLB_NAME_OVERRIDES = {
  "DjaOuqgRWGQ_0041828_0043628_seg0-1025_hstack":
    "DjaOuqgRWGQ_0041828_0043628_seg0-1025",
};
const CAMERA_VIEWS_VER = "views1";
const DEFAULT_THREE_CAMERA = {
  direction: { x: 0.232788, y: 0.200791, z: 0.951574 },
  targetScale: { x: -0.011213, y: -0.007986, z: 0.00858 },
  fitScale: 1.046048,
};
let cameraViews = {
  default: DEFAULT_THREE_CAMERA,
  scenes: {},
};

function numericVector(value, fallback) {
  const v = value || {};
  return {
    x: Number.isFinite(v.x) ? v.x : fallback.x,
    y: Number.isFinite(v.y) ? v.y : fallback.y,
    z: Number.isFinite(v.z) ? v.z : fallback.z,
  };
}

function normalizeCameraSpec(spec, fallback = DEFAULT_THREE_CAMERA) {
  if (!spec || typeof spec !== "object") return fallback;
  return {
    direction: numericVector(spec.direction, fallback.direction),
    targetScale: numericVector(spec.targetScale || spec.targetScaleVsMaxDim, fallback.targetScale),
    fitScale: Number.isFinite(spec.fitScale) ? spec.fitScale :
      (Number.isFinite(spec.fitScaleVsBase) ? spec.fitScaleVsBase : fallback.fitScale),
  };
}

async function loadCameraViews() {
  try {
    const response = await fetch(`./camera-views.json?${CAMERA_VIEWS_VER}`, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const defaultSpec = normalizeCameraSpec(data.default, DEFAULT_THREE_CAMERA);
    const scenes = {};
    for (const [sceneName, spec] of Object.entries(data.scenes || {})) {
      scenes[sceneName] = normalizeCameraSpec(spec, defaultSpec);
    }
    cameraViews = { default: defaultSpec, scenes };
  } catch (error) {
    console.warn("Using built-in camera defaults; failed to load camera-views.json", error);
  }
}

function cameraForScene(sceneName) {
  return cameraViews.scenes[sceneName] || cameraViews.default || DEFAULT_THREE_CAMERA;
}

function applyInitialCamera(camera, controls, maxDim, sceneName) {
  const spec = cameraForScene(sceneName);
  const baseDist = maxDim / (2 * Math.tan(camera.fov * Math.PI / 360));
  controls.target.set(
    maxDim * spec.targetScale.x,
    maxDim * spec.targetScale.y,
    maxDim * spec.targetScale.z
  );
  camera.position.set(
    controls.target.x + baseDist * spec.fitScale * spec.direction.x,
    controls.target.y + baseDist * spec.fitScale * spec.direction.y,
    controls.target.z + baseDist * spec.fitScale * spec.direction.z
  );
  camera.near = baseDist / 200;
  camera.far = baseDist * 100;
  camera.updateProjectionMatrix();
  controls.update();
}

const cameraViewsPromise = loadCameraViews();
const glbFile = (GLB_NAME_OVERRIDES[name] || name) + ".glb";
// Full-resolution GLBs are hosted on Hugging Face Datasets (too large for the
// GitHub repo). Resolve URL serves the raw file with permissive CORS so the
// browser can fetch + parse directly.
// ?url=... lets local previews override the HF URL (e.g. for rebake A/B).
const url = params.get('url')
  || "https://huggingface.co/datasets/silentchen/vggt-omega-glbs-full/resolve/main/" + glbFile + "?clean1";

const hud = document.getElementById('hud');

if (!name) {
  hud.textContent = "Missing ?name=… in URL";
  hud.classList.add('warn');
}

// ---- scene setup ----------------------------------------------------------
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 5000);
camera.position.set(2, 1.2, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 1.6));
const d1 = new THREE.DirectionalLight(0xffffff, 1.6); d1.position.set(5,8,5);   scene.add(d1);
const d2 = new THREE.DirectionalLight(0xffffff, 0.9); d2.position.set(-3,4,-5); scene.add(d2);

let model = null;
let camsGroup = null;
let showCams = true;
let savedCam = null;

// ---- camera trajectory viz -----------------------------------------------
function buildCamsViz(extras) {
  const flat = extras?.cam_from_worlds || [];
  const N = extras?.frame_count || 0;
  if (!flat.length || !N) return null;
  const positions = new Float32Array(N * 3);
  const colors    = new Float32Array(N * 3);
  const M = new THREE.Matrix4();
  const P = new THREE.Vector3();
  const C = new THREE.Color();
  for (let i = 0; i < N; i++) {
    const o = i * 16;
    M.set(flat[o+0],  flat[o+1],  flat[o+2],  flat[o+3],
          flat[o+4],  flat[o+5],  flat[o+6],  flat[o+7],
          flat[o+8],  flat[o+9],  flat[o+10], flat[o+11],
          flat[o+12], flat[o+13], flat[o+14], flat[o+15]).invert();
    P.setFromMatrixPosition(M);
    positions[i*3]   = P.x;
    positions[i*3+1] = P.y;
    positions[i*3+2] = P.z;
    C.setHSL((i / Math.max(N - 1, 1)) * 0.83, 1.0, 0.55);
    colors[i*3]   = C.r;
    colors[i*3+1] = C.g;
    colors[i*3+2] = C.b;
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geom.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
  const dots = new THREE.Points(geom, new THREE.PointsMaterial({
    size: 8, sizeAttenuation: false, vertexColors: true,
    transparent: true, depthTest: false, depthWrite: false,
  }));
  dots.renderOrder = 999;
  const line = new THREE.Line(geom, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.55,
    depthTest: false, depthWrite: false,
  }));
  line.renderOrder = 998;
  const g = new THREE.Group();
  g.add(dots); g.add(line);
  return g;
}

// ---- load -----------------------------------------------------------------
const loader = new GLTFLoader();
const t0 = performance.now();
let lastFetchedMB = 0;
if (name) {
  hud.textContent = "Loading…";
  loader.load(url,
    async (gltf) => {
      model = gltf.scene;
      scene.add(model);

      const box = new THREE.Box3().setFromObject(model);
      const sz  = box.getSize(new THREE.Vector3());
      const ctr = box.getCenter(new THREE.Vector3());
      model.position.sub(ctr);

      const extras = gltf.parser?.json?.extras || {};
      camsGroup = buildCamsViz(extras);
      if (camsGroup) model.add(camsGroup);

      const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
      await cameraViewsPromise;
      applyInitialCamera(camera, controls, maxDim, name);

      savedCam = {
        pos: camera.position.clone(),
        tgt: controls.target.clone(),
      };

      // count rendered points for the HUD
      let n = 0;
      model.traverse(c => {
        if (c.isPoints && c.geometry?.attributes?.position) {
          n += c.geometry.attributes.position.count;
        }
      });
      const t = ((performance.now() - t0) / 1000).toFixed(1);
      hud.classList.remove('loading');
      hud.textContent = `${(n/1e6).toFixed(2)} M points · ${lastFetchedMB.toFixed(0)} MB · ${t}s`;
    },
    (p) => {
      lastFetchedMB = p.loaded / 1e6;
      hud.textContent = p.total
        ? `Loading… ${Math.round(p.loaded / p.total * 100)}%`
        : `Loading… ${lastFetchedMB.toFixed(0)} MB`;
    },
    (err) => {
      console.warn(err);
      hud.classList.remove('loading');
      hud.textContent = "Failed to load " + glbFile;
      hud.classList.add('warn');
    }
  );
}

// ---- input ---------------------------------------------------------------
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    if (savedCam) {
      camera.position.copy(savedCam.pos);
      controls.target.copy(savedCam.tgt);
      controls.update();
    }
  } else if (e.key === 'l' || e.key === 'L') {
    if (camsGroup) {
      showCams = !showCams;
      camsGroup.visible = showCams;
    }
  }
});

// ---- render loop ---------------------------------------------------------
function tick() {
  requestAnimationFrame(tick);
  controls.update();
  const r = canvas.getBoundingClientRect();
  const w = Math.floor(r.width), h = Math.floor(r.height);
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
