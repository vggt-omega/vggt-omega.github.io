<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VGGT-Ω · full point cloud viewer</title>
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TSQGH8Q0WV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());

  gtag('config', 'G-TSQGH8Q0WV');
</script>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #ffffff; color: #222;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
#viewer { position: fixed; inset: 0; }
model-viewer { width: 100%; height: 100%; background: #ffffff; --poster-color: #ffffff; }
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,0));
  pointer-events: none;
}
header > * { pointer-events: auto; }
.back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: rgba(255,255,255,.92);
  color: #222; text-decoration: none;
  border: 1px solid rgba(0,0,0,.12);
  border-radius: 6px;
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  backdrop-filter: blur(6px);
  transition: background .12s;
}
.back:hover { background: rgba(240,240,242,.96); }
.scene-name {
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 13px;
  color: rgba(0,0,0,.7);
  background: rgba(255,255,255,.7);
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,.08);
  backdrop-filter: blur(6px);
}
.tag {
  margin-left: auto;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 10.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #fff;
  background: rgba(184,51,106,.85);
  padding: 4px 10px;
  border-radius: 6px;
}
#hud {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  font-size: 12px;
  color: rgba(0,0,0,.7);
  background: rgba(255,255,255,.85);
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,.1);
  backdrop-filter: blur(8px);
  min-width: 220px;
  text-align: center;
  display: none;
}
#hud.warn { color: #c0392b; border-color: rgba(192,57,43,.35); display: block; }
</style>
</head>
<body>

<header>
  <a href="index.html#gallery" class="back">‹ back to gallery</a>
  <span class="tag">Full point cloud</span>
</header>

<div id="viewer">
  <model-viewer id="QualitativeResult"
                alt="3D Model"
                loading="eager"
                touch-action="pan-y" environment-image="legacy"
                camera-orbit="180deg 70deg auto"
                zoom-sensitivity="0.2" camera-controls disable-tap min-camera-orbit="auto auto 1m"
                max-camera-orbit="auto auto 10m" interaction-prompt="none" shadow-intensity="0" ar
                disable-shadow ar-modes="webxr scene-viewer quick-look"
                style="width: 100%; height: 100%; background: #ffffff;">
  </model-viewer>
</div>

<div id="hud">Loading…</div>

<script>
// ---- resolve which GLB to load --------------------------------------------
const params = new URLSearchParams(location.search);
const name = params.get('name') || '';
// The video name might use a slightly different GLB filename — keep one alias.
const GLB_NAME_OVERRIDES = {
  "DjaOuqgRWGQ_0041828_0043628_seg0-1025_hstack":
    "DjaOuqgRWGQ_0041828_0043628_seg0-1025",
};
const glbFile = (GLB_NAME_OVERRIDES[name] || name) + ".glb";
// Full-resolution GLBs are hosted on Hugging Face Datasets (too large for the
// GitHub repo). Resolve URL serves the raw file with permissive CORS so the
// browser can fetch + parse directly.
// ?url=... lets local previews override the HF URL (e.g. for rebake A/B).
const url = params.get('url')
  || "https://huggingface.co/datasets/silentchen/vggt-omega-glbs-full/resolve/main/" + glbFile + "?clean1";

const hud = document.getElementById('hud');
const mv = document.getElementById('QualitativeResult');

if (!name) {
  hud.textContent = "Missing ?name=… in URL";
  hud.classList.add('warn');
} else {
  mv.setAttribute('src', url);
  mv.addEventListener('error', () => {
    hud.textContent = "Failed to load " + glbFile;
    hud.classList.add('warn');
  });
}
</script>
</body>
</html>
